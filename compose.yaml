name: marketplace-api-412
services:
  gateway-api:
    container_name: gateway-api-412
    image: nginx:alpine
    ports:
      - "6139:80"
    volumes:
      - ./GatewayApi/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - purchases-api
      - products-api
      - users-api
    restart: unless-stopped
    
  users-api:
    container_name: users-api-412
    image: users-api-412
    build:
      context: .
      dockerfile: UsersApi/Dockerfile
    expose:
      - "8080"
    environment:
      JWT: ${JWT}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION: Host=database;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - migrations
    restart: unless-stopped
  
  purchases-api:
    container_name: purchases-api-412
    image: purchases-api-412
    build:
      context: .
      dockerfile: PurchaseApi/Dockerfile
    expose:
      - "8080"
    environment:
      JWT: ${JWT}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION: Host=database;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - migrations
    restart: unless-stopped
      
  products-api:
    container_name: products-api-412
    image: products-api-412
    build:
      context: .
      dockerfile: ProductsApi/Dockerfile
    expose:
      - "8080"
    environment:
      JWT: ${JWT}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION: Host=database;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - migrations
    restart: unless-stopped
  
  database:
    container_name: database-412
    image: postgres:18.4-alpine3.23
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - database-data:/var/lib/postgresql
    restart: unless-stopped
  
  migrations:
    container_name: migrations-412
    image: migrations-412
    build:
      context: .
      dockerfile: Migrations/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION: Host=database;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - database
    restart: on-failure

volumes:
  database-data:

